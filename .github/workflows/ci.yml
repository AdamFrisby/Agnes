name: CI

# Runs once a day (only if there were commits that day), on pull requests, and on demand.
# It intentionally does NOT run on every push to main — a daily build is plenty for this repo.
on:
  schedule:
    - cron: '0 6 * * *'   # ~06:00 UTC daily; the "gate" job skips it when nothing changed
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Don't pile up runs — cancel a superseded run on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: on the daily schedule, only continue when there were commits in the last day.
  # Non-scheduled triggers (pull_request, manual) always continue.
  gate:
    name: Decide whether to run
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Trigger '${{ github.event_name }}' → run."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$(git log --since='25 hours ago' --oneline)" ]; then
            echo "Commits in the last day → run."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last day → skip the build."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & test (core)
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Build & test the core/host/client libraries and tests.
      # The Uno UI heads (WASM/Android) require additional workloads and are
      # built in a separate job once those heads are added.
      - name: Restore
        run: dotnet restore Agnes.Core.slnf

      - name: Build
        run: dotnet build Agnes.Core.slnf --configuration Release --no-restore

      - name: Test
        run: dotnet test Agnes.Core.slnf --configuration Release --no-build --verbosity normal

  ui-build:
    name: Build Uno UI heads (desktop + web)
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Install the workloads the heads need (android for the mobile head,
      # wasm-tools for the web head; desktop needs neither).
      - name: Install Uno workloads
        run: dotnet workload install wasm-tools android

      # Build all heads (android, web, desktop).
      - name: Build UI heads
        run: dotnet build src/Agnes.App/Agnes.App/Agnes.App.csproj -c Release
